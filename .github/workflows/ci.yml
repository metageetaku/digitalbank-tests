name: 🧪 JEFF Bank — Tests Automatisés CI/CD

on:
  push:
    branches: [main, sprint-1]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:

  # ── Smoke Tests ──────────────────────────────────────────────────────────
  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🎭 Installer Cypress
        run: npx cypress install

      - name: 🚀 Démarrer le serveur
        run: python3 -m http.server 3000 --directory app &

      - name: ⏳ Attendre que le serveur soit prêt
        run: sleep 5

      - name: 🔥 Lancer les Smoke Tests
        run: npx cypress run --spec "cypress/e2e/00-smoke.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: 📊 Upload screenshots si échec
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-screenshots
          path: cypress/screenshots/

  # ── Tests E2E parallélisés ───────────────────────────────────────────────
  tests-e2e:
    name: 🌐 Tests — ${{ matrix.spec }}
    runs-on: ubuntu-latest
    needs: smoke-tests
    strategy:
      fail-fast: false
      matrix:
        spec:
          - '01-authentification'
          - '02-dashboard'
          - '03-virements'
          - '04-factures'
          - '05-securite'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🎭 Installer Cypress
        run: npx cypress install

      - name: 🚀 Démarrer le serveur
        run: python3 -m http.server 3000 --directory app &

      - name: ⏳ Attendre
        run: sleep 5

      - name: 🧪 Lancer ${{ matrix.spec }}
        run: npx cypress run --spec "cypress/e2e/${{ matrix.spec }}.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: 📊 Upload screenshots si échec
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.spec }}
          path: cypress/screenshots/

  # ── Rapport final ────────────────────────────────────────────────────────
  rapport-final:
    name: 📊 Rapport Final
    runs-on: ubuntu-latest
    needs: tests-e2e
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 🐛 Créer une Issue si échec
        if: needs.tests-e2e.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Échec des tests — ' + new Date().toLocaleDateString('fr-FR'),
              body: `## Anomalie détectée\n\n**Branch :** \`${context.ref}\`\n**Commit :** \`${context.sha}\`\n**Logs :** [Voir ici](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n## Actions requises\n- [ ] Analyser les logs\n- [ ] Corriger et valider`,
              labels: ['bug', 'automatisation']
            })