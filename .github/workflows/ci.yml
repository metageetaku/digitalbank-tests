name: 🧪 JEFF Bank — Tests Automatisés CI/CD

on:
  push:
    branches: [main, sprint-1]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:

  smoke-tests:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Lancer l'application Docker
        run: docker compose up -d app

      - name: ⏳ Attendre que l'app soit prête
        run: sleep 5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🔥 Smoke Tests
        run: npm run cy:smoke
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: 📊 Upload rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: cypress/results/

  tests-e2e:
    name: 🌐 Tests E2E — ${{ matrix.spec }}
    runs-on: ubuntu-latest
    needs: smoke-tests
    strategy:
      fail-fast: false
      matrix:
        spec:
          - '01-authentification'
          - '02-dashboard'
          - '03-virements'
          - '04-factures'
          - '05-securite'
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Lancer l'application
        run: docker compose up -d app

      - name: ⏳ Attendre
        run: sleep 5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: 🧪 Lancer ${{ matrix.spec }}
        run: npx cypress run --spec "cypress/e2e/${{ matrix.spec }}.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: 📊 Upload rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.spec }}
          path: |
            cypress/results/
            cypress/screenshots/
            cypress/videos/

  rapport-final:
    name: 📊 Rapport Final
    runs-on: ubuntu-latest
    needs: tests-e2e
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 🐛 Créer une Issue si échec
        if: needs.tests-e2e.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Échec des tests — ' + new Date().toLocaleDateString('fr-FR'),
              body: `## Anomalie détectée\n\n**Branch :** \`${context.ref}\`\n**Commit :** \`${context.sha}\`\n**Logs :** [Voir ici](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n## Actions requises\n- [ ] Analyser les logs\n- [ ] Corriger et valider`,
              labels: ['bug', 'automatisation', 'priorité-haute']
            })
